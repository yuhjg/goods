{extend name="layout" /}
{block name="content"}
<div style="font-size:20px;font-weight:700;color:#f0f0f0;margin-bottom:20px">✏️ 编辑求购</div>

<form action="{:url('wanted/update', ['id'=>$wanted.id])}" method="post" enctype="multipart/form-data">
<div class="form-group">
  <label class="form-label">求购标题 *</label>
  <input type="text" name="title" class="form-input" value="{$wanted.title}" maxlength="200" required>
</div>

<div class="form-group">
  <label class="form-label">求购描述</label>
  <textarea name="description" class="form-textarea" placeholder="描述想要的物品要求..." maxlength="2000">{$wanted.description}</textarea>
</div>

<div class="form-group">
  <label class="form-label">求购地址 *</label>
  <input type="text" name="wanted_address" class="form-input" value="{$wanted.wanted_address}" maxlength="500" required>
</div>

{if $wanted.image_url}
<div class="form-group">
  <label class="form-label">当前图片</label>
  <div class="upload-preview" id="existingImage">
    <div class="upload-preview-item">
      <img src="{$wanted.image_url}" alt="">
      <button type="button" class="del" onclick="this.parentElement.remove();document.getElementById('deleteFlag').value='1'">×</button>
    </div>
  </div>
  <div class="form-hint">点击 × 删除当前图片</div>
</div>
<input type="hidden" name="delete_image" id="deleteFlag" value="0">
{/if}

<div class="form-group">
  <label class="form-label">上传新图片</label>
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="icon">🖼️</div>
    <div class="text">点击上传新图片替换</div>
  </div>
  <input type="file" name="image" id="fileInput" accept="image/*" onchange="previewNewImage(event)">
  <div class="upload-preview" id="newPreviewContainer"></div>
</div>

<div style="margin-top:24px;display:flex;gap:12px">
  <button type="submit" class="btn btn-primary" style="flex:1">保存修改</button>
  <a href="{:url('wanted/detail', ['id'=>$wanted.id])}" class="btn" style="background:#1a1a24;color:#888;border:1px solid #2a2a3a">取消</a>
</div>
</form>

<script>
function previewNewImage(e) {
  var file = e.target.files[0];
  if (!file) return;
  var c = document.getElementById('newPreviewContainer');
  c.innerHTML = '';
  var div = document.createElement('div');
  div.className = 'upload-preview-item';
  var img = document.createElement('img');
  img.src = URL.createObjectURL(file);
  var del = document.createElement('button');
  del.className = 'del';
  del.textContent = '×';
  del.onclick = function(e){
    e.stopPropagation();
    c.innerHTML = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('uploadArea').style.display = '';
  };
  div.appendChild(img);
  div.appendChild(del);
  c.appendChild(div);
  document.getElementById('uploadArea').style.display = 'none';
}
</script>
{/block}
